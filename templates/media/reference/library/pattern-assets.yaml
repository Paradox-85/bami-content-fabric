# ============================================================================
# pattern-assets.yaml
# ============================================================================
# Provenance index linking enabled/planned graphical pattern variants to
# reference assets under templates/media/reference/library/ and
# templates/media/reference/input/.
#
# Each entry maps a pattern_template_id to one or more reference assets
# used for visual verification. Entries may also declare that no reference
# asset is required (reference_asset_required: false).
#
# This file is maintained as part of the pattern registry and validated
# by tests/test_pattern_registry.py.
# ============================================================================

