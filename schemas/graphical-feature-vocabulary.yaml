# ============================================================================
# graphical-feature-vocabulary.yaml
# ============================================================================
# Controlled vocabulary of graphical features used by pattern registry
# entries. Features describe rendering capabilities, constraints, and
# complexity metadata. The same names are used in registry entries and
# in the complexity gate (shared/pptx/graphical_complexity.py).
# ============================================================================

# --- Renderer capability ---
native_editable:
  description: Pattern is rendered with native PPTX shapes; each shape is
    individually editable in PowerPoint without raster fallback.
  type: boolean
  default: false

requires_mermaid:
  description: Pattern requires Mermaid CLI (mmdc) for rendering.
  type: boolean
  default: false

supports_body_text:
  description: Pattern accommodates optional per-step body/description text
    in addition to titles.
  type: boolean
  default: false

# --- Capacity & complexity ---
max_items:
  description: Maximum number of items (steps, stages, nodes) supported
    by this graphical template before the complexity gate rejects.
  type: integer
  brand_capable: true  # per-brand values supported (bami/kvi)

shape_budget:
  description: Maximum number of PPTX shapes the pattern may create for a
    single slide. Used as a soft capacity gate.
  type: integer
  brand_capable: false

connector_budget:
  description: Maximum number of connector/arrow shapes the pattern may
    create. Used for overlap and z-order validation.
  type: integer
  brand_capable: false

text_density:
  description: Estimated text density in characters per item. Values:
    low (0-40), medium (41-100), high (101+).
  type: string
  enum: [low, medium, high]
  default: low

min_step_width_in:
  description: Minimum width in inches required per step/item for the
    graphical template to lay out without overlap.
  type: number
  unit: inches
  brand_capable: true

# --- Brand & assets ---
brand_adaptive:
  description: Pattern adapts to brand tokens (color palette, fonts).
    If false, pattern uses hard-coded colours and may not work for KVI.
  type: boolean
  default: true

reference_asset_required:
  description: Pattern requires a reference PNG or SVG asset for visual
    verification. The asset must exist under templates/media/reference/.
  type: boolean
  default: false

provenance_id:
  description: Identifier linking to a reference asset path or sidecar
    metadata under templates/media/reference/library/pattern-assets.yaml.
  type: string
  nullable: true

# --- Visual fidelity ---
visual_fidelity:
  description: >
    Visual fidelity classification of this variant vs its reference SVG asset.
    Classification must be determined by human visual comparison or automated
    structural comparison, not assumed.
  type: string
  enum: [high-fidelity, acceptable-simplification, low-fidelity, semantic-only, placeholder]
  default: placeholder

render_mode:
  description: How this variant is rendered in the PPTX output.
    'native' = PPTX shapes only; 'svg' = embedded SVG; 'hybrid' = native + SVG;
    'mermaid' = rendered via Mermaid CLI.
  type: string
  enum: [native, svg, hybrid, mermaid]
  default: native

reference_asset_id:
  description: Stable identifier of the reference SVG asset used for visual
    comparison. Should match a filename stem under templates/media/reference/
    or a key in pattern-assets.yaml.
  type: string
  nullable: true

# --- Visual complexity metadata ---
required_icon_count:
  description: Number of distinct icon/glyph shapes the variant layout requires.
  type: integer
  minimum: 0
  default: 0

required_layer_count:
  description: Number of distinct visual layers (background, shapes, text,
    connectors) in the variant composition.
  type: integer
  minimum: 1
  default: 2

required_colour_roles:
  description: Minimum number of distinct colour roles the variant uses
    (e.g. primary, accent, neutral, background).
  type: integer
  minimum: 1
  default: 1

required_connector_style:
  description: Expected connector visual style.
  type: string
  enum: [arrow-line, chevron, arc, none, dashed-line, curved-arrow]
  default: none

required_background_regions:
  description: Number of distinct background regions/shapes the variant
    creates (e.g. cards, filled areas, bars).
  type: integer
  minimum: 0
  default: 0

required_depth_effects:
  description: Comma-separated list of depth effects used
    (e.g. shadow, gradient, 3d-rotation, bevel).
  type: string
  default: ""

minimum_graphical_occupancy:
  description: Minimum fraction (0.0–1.0) of the slide area that should be
    covered by graphical elements (shapes, images, connectors) as opposed
    to whitespace or text-only regions.
  type: number
  minimum: 0.0
  maximum: 1.0
  default: 0.15

maximum_text_to_graphics_ratio:
  description: Maximum ratio of text-shape area to graphical-shape area.
    A high ratio indicates a text-heavy slide; a low ratio indicates
    a graphics-heavy slide.
  type: number
  minimum: 0.0
  default: 5.0
  nullable: true
