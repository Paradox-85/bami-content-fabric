# ============================================================================
# pattern-selection-manifest.yaml
# ============================================================================
# Executable encoding of D1/D2 decision tables (widget-selection.md).
# Machine-readable SSOT for deterministic pattern selection in Branch B
# (python-pptx). SVG-agnostic by design — operates on canonical
# pattern_family / layout / block_kind identifiers only.
#
# Methodology (every entry):
#   - registry drift reconciliation: explicit layout/block_kind, not
#     trusting categories.yaml runtime_kind
#   - naming aliases: kebab/underscore/D2-word variants
#   - roadmap vs timeline distinction via scenario_signal + disallowed_when
#   - process vs loop distinction via scenario_signal + structural keys
#   - structural requirements: required_any / required_all
#   - variant thresholds (item_count): min/max per family, canvas-adaptive
#   - spatial fit checks: orientation, min_col_width_in, overflow action
#   - color binding: auto_status (kpi delta), palette tokens
#   - content sufficiency: missing required keys → reject (no-implicit-fallback)
#   - disallowed uses: layout XOR blocks, template locks, etc.
#   - fallback chains: primary → secondary → primitive terminal
#
# Tie-breaking rule:
#   The FIRST fully matching entry in declaration order wins.
#   If two entries have equal structural specificity, rank (descending)
#   breaks the tie. This guarantees two agents with identical input
#   produce identical output.
#
# Registry drift notes (categories.yaml runtime_kind stale):
#   - funnel-diagram, swimlane, decision-tree, mind-map, checklist-status,
#     chart-donut-pie, chart-* → stale/null in categories.yaml
#   - phased-rollout-timeline, roadmap-with-milestones, historical-timeline
#     → stale/null runtime_kind (use gantt/mermaid block_kind directly)
#   - comparison-panel used as layout name, block_kind=card (card blocks)
# ============================================================================

manifest:
