      render_method: native
      scenario_signal: task-rows-x-periods
      narrative_intent: [roadmap, scheduling, plan-with-phases]
      structural:
        required_any: [[periods], [sections]]
        required_all: []
        count_key: periods
      capacity:
        min: 2
        max:
          bami: 8
          kvi: 6
        count_path: periods
        overflow:
          at: 9
          switch_family: data-table
      spatial:
        orientation: horizontal
        min_col_width_in: 2.5
      color:
        auto_status: false
        palette: [primary, primary_dark, primary_mid, positive, warning]
      fallback_chain: [phased-rollout-timeline, historical-timeline]
      disallowed_when: [events-only-no-periods]
      rank: 100

