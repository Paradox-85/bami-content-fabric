# ============================================================================
# pattern-registry.yaml
# ============================================================================
# Versioned graphical pattern registry — SSOT for family → graphical variant
# mapping, renderer binding, validation contracts, and complexity metadata.
#
# Augments pattern-selection-manifest.yaml: does NOT replace it.
# Cross-validated at test time by tests/test_manifest_sync.py.
#
# Methodology:
#   - registry_version: SemVer-tracked registry schema version.
#   - entries: Each links a family to one or more graphical_variants.
#     Variations within a family share the same semantic content contract
#     but produce different graphical layouts.
#   - pattern_template_id: stable key "{family}/{graphical_variant}@{version}".
#   - renderer_binding: tells the resolver which injector (if any) to use.
#   - status: "enabled" = active in runtime, "planned" = scaffolded but not
#     yet default, "disabled" = intentionally not deployed.
# ============================================================================

registry_version: 1.1.0
description: >-
  Versioned graphical pattern registry for Branch B (python-pptx).
  Maps selection families → versioned graphical templates with
  renderer bindings, validation contracts, and complexity metadata.

