      - schemas/contracts/numbered-process-steps.v1.json
    graphical_variants:
      - graphical_variant: folded-arrow-horizontal
        version: 1.0.0
        status: enabled  # runtime-default in Pass 2
        pattern_template_id: numbered-process-steps/folded-arrow-horizontal@1.0.0
        renderer_binding:
          native:
            injector_id: folded-arrow-horizontal
            injector_version: 1.0.0
        features:
          native_editable: true
          requires_mermaid: false
          supports_body_text: false
          max_items: 6
          shape_budget: 24
          connector_budget: 6
          text_density: low
          min_step_width_in: 1.5
          brand_adaptive: true
          reference_asset_required: true
          provenance_id: arrow-process-infographics_f8e31e
          visual_fidelity: placeholder  # TBD — requires human classification
          render_mode: native
          reference_asset_id: ""
          required_icon_count: 4
          required_layer_count: 2
          required_colour_roles: 2
          required_connector_style: arrow-line
          required_background_regions: 0
          required_depth_effects: ""
          minimum_graphical_occupancy: 0.25
          maximum_text_to_graphics_ratio: 2.0
        graphical_variant_description: >-
          Numbered circles joined by right-arrow connectors (circles-and-arrows
          style, not a continuous folded ribbon). Each step is a filled circle
          with a white numeral. No body text. Designed for 3–6 items.

